<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bevy Open Siege</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0c1810;
        color: #d9e8d4;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        outline: none;
        max-width: 100vw;
        max-height: 100vh;
      }
      #loading {
        position: absolute;
        text-align: center;
      }
      #loading .bar {
        margin-top: 1em;
        font-size: 0.9em;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>Bevy Open Siege</h1>
      <div class="bar">Loading the greenhouse… (~10 MB, first visit takes a moment)</div>
    </div>
    <script type="module">
      const loading = document.getElementById("loading");
      const bar = loading.querySelector(".bar");

      async function pickBackend() {
        // One wasm binary supports one backend (bevy webgl2 XOR webgpu),
        // so probe WebGPU and pick the matching bundle at runtime.
        try {
          if (navigator.gpu && (await navigator.gpu.requestAdapter())) {
            return "webgpu";
          }
        } catch (_) {
          /* fall through to WebGL2 */
        }
        return "webgl2";
      }

      const backend = await pickBackend();
      try {
        const { default: init } = await import(`./bevy_open_siege_${backend}.js`);
        await init();
        loading.remove();
      } catch (error) {
        // winit uses a JS exception for control flow on startup; anything else is real.
        if (error?.message?.startsWith("Using exceptions for control flow")) {
          loading.remove();
        } else {
          bar.textContent = `Failed to start (${backend}): ${error}`;
          throw error;
        }
      }
    </script>
  </body>
</html>
